<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wizzard Clicker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stars" aria-hidden="true"></div>
 
  <main class="game">
    <header class="game-header">
      <div class="header-top">
        <h1 class="title">Wizzard Clicker</h1>
        <button id="settings-btn" class="icon-btn" aria-label="Settings">⚙️</button>
      </div>
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Mana</span>
          <span id="mana" class="stat-value">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Mana/sec</span>
          <span id="mps" class="stat-value">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Mana/click</span>
          <span id="mpc" class="stat-value">1</span>
        </div>
      </div>
    </header>
 
    <section class="clicker-area">
      <button id="wizard" class="wizard" aria-label="Cast spell to gain mana">
        <div class="hat"></div>
        <div class="beard"></div>
        <div class="staff">🪄</div>
        <div class="glow"></div>
      </button>
      <p class="hint">Click the wizard to cast spells</p>
    </section>
 
    <section class="shop">
      <h2>Spell Shop</h2>
      <ul id="upgrade-list" class="upgrade-list"></ul>
    </section>
  </main>
 
  <div id="floating-text-container"></div>
 
  <div id="event-toast" class="event-toast hidden">
    <div class="event-title" id="event-title"></div>
    <div class="event-desc" id="event-desc"></div>
    <div id="event-timer" class="event-timer"></div>
  </div>
 
  <div id="confirm-modal" class="confirm-modal hidden">
    <div class="confirm-panel">
      <h3>Reset Progress?</h3>
      <p>Are you sure? This will erase all your mana, upgrades, and progress. It cannot be undone.</p>
      <div class="confirm-actions">
        <button id="cancel-reset" class="secondary-btn">Cancel</button>
        <button id="confirm-reset" class="danger-btn">Reset Progress</button>
      </div>
    </div>
  </div>
 
  <div id="settings-panel" class="settings-panel hidden">
    <div class="settings-header">
      <h2>Settings</h2>
      <button id="close-settings" class="icon-btn" aria-label="Close settings">✕</button>
    </div>
    <div class="setting-row">
      <label for="sfx-volume">SFX Volume</label>
      <input id="sfx-volume" type="range" min="0" max="100" value="50" />
    </div>
    <div class="setting-row">
      <label for="music-volume">Music Volume</label>
      <input id="music-volume" type="range" min="0" max="100" value="30" />
    </div>
    <div class="setting-row">
      <label for="mute-toggle">Mute All</label>
      <button id="mute-toggle" class="toggle-btn">Off</button>
    </div>
    <div class="setting-row">
      <label for="events-toggle">Random Events</label>
      <button id="events-toggle" class="toggle-btn">On</button>
    </div>
    <div class="setting-row">
      <button id="reset-save" class="danger-btn">Reset Game</button>
    </div>
    <div class="secret-code">
      <label for="secret-input">Admin Code</label>
      <input id="secret-input" type="text" placeholder="Enter secret code..." autocomplete="off" />
      <div id="secret-hint" class="secret-hint">Wrong code.</div>
    </div>
  </div>
 
  <div id="admin-panel" class="admin-panel hidden">
    <div class="admin-header">
      <h2>🛡️ Admin Panel</h2>
      <button id="close-admin" class="icon-btn" aria-label="Close admin panel">✕</button>
    </div>
    <div class="admin-grid">
      <button id="admin-mana" class="admin-btn">+10,000 Mana</button>
      <button id="admin-clicks" class="admin-btn">Set Clicks to 100</button>
      <button id="admin-max" class="admin-btn">Max All Upgrades</button>
      <button id="admin-storm" class="admin-btn">Trigger Mana Storm</button>
      <button id="admin-dark" class="admin-btn">Trigger Dark Pact</button>
      <button id="admin-treasure" class="admin-btn">Trigger Treasure Horde</button>
      <button id="admin-random" class="admin-btn">Trigger Random Event</button>
      <button id="admin-god" class="admin-btn">Toggle God Mode</button>
      <button id="admin-reset" class="admin-btn danger">Reset Game</button>
    </div>
  </div>
 
  <script src="script.js"></script>
</body>
</html>
